services:
  main-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - db
      - profile-service
    environment:
      APP_PORT: "8080"
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: diary_db
      DB_SSLMODE: disable
      PROFILE_SERVICE_URL: http://profile-service:8081
      JWT_SECRET: dev-secret-key

  profile-service:
    build:
      context: .
      dockerfile: Dockerfile.profile
    ports:
      - "8081:8081"

  db:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: diary_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
